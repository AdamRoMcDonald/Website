<!DOCTYPE html>
<html lang="en" xmlns:th = http://www.thymeleaf.org">
<head>
    <title>Stock Data</title>
    <link rel="stylesheet" href="" th:href="@{/css/style.css}"/>
    <style>
        body{
            background-color: aquamarine;
        }
        font{
            font-family: Calibri;
        }
    </style>
    <script>
        function submitForm() {
            var stockName = document.getElementById("stockName").value;
            var startDate = document.getElementById("startDate").value;
            var endDate = document.getElementById("endDate").value;

            startDate = formatDate(startDate);
            endDate = formatDate(endDate);

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/stock-data", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");


            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    // Update the result element with the response text
                    document.getElementById("temp").innerHTML = xhr.responseText;
                }
            };

            var data = "stockName=" + stockName + "&startDate=" + startDate + "&endDate=" + endDate;
            xhr.send(data)
        }
        function formatDate(inputDate) {
            var date = new Date(inputDate);
            var month = date.getMonth() + 1; // Months are zero-based in JavaScript, so add 1
            var day = date.getDate();
            var year = date.getFullYear();

            // Add leading zero to month and day if necessary
            if (month < 10) month = '0' + month;
            if (day < 10) day = '0' + day;

            return month + '/' + day + '/' + year;
        }
    </script>
</head>
<body>
<h1>Enter Stock Information</h1>
<form onsubmit="event.preventDefault(); submitForm();">
    <label for="stockName">Stock Name:</label>
    <input type="text" id="stockName" name="stockName" required><br><br>

    <label for="startDate">Start Date:</label>
    <input type="date" id="startDate" name="startDate" required><br><br>

    <label for="endDate">End Date:</label>
    <input type="date" id="endDate" name="endDate" required><br><br>

    <input type="submit" value="Get Data">
</form>

<!-- Display the result here -->
<div id="temp">
    <table border="1">
        <thead>
        <tr>
            <th>Symbol</th>
            <th>Date</th>
            <th>Open</th>
            <th>High</th>
            <th>Low</th>
            <th>Close</th>
            <th>Volume</th>
        </tr>
        </thead>
        <tbody id="stockData">
        <!-- Stock data rows will be added here dynamically -->
        </tbody>
    </table>
</div>
</body>
</html>
